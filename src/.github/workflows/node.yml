name : Node CI

on :
  push : 
    branches : 
      - main

  pull_request : 
    branches : 
      - main


jobs : 
  build : 
    runs-on : ubuntu-latest

    strategy : 
      matrix : 
        node-version : [20.x]

    steps :

      - uses: actions/checkout@v4

      - name : install node 
        uses: actions/setup-node@v4
        with :
          node-version : ${{ matrix.node-version }}

      - name : Install dependencies
        run : npm install

      - name : run Linter
        run : npm run lint
      
      - name : run Tests
        run : npm test

      - name : run Build
        run : npm run build